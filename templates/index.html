<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestion Quincaillerie</title>

<!-- Bootstrap 5 pour le design -->
<link href="https://jsdelivr.net" rel="stylesheet">

<style>
body {
    background: #f4f6f9;
}

.navbar {
    background: #0d6efd;
}

.card {
    box-shadow: 0px 3px 10px rgba(0,0,0,.2);
}

.table {
    font-size: 14px;
}

footer {
    margin-top: 30px;
    padding: 15px;
    background: #0d6efd;
    color: white;
    text-align: center;
}

/* 🖨️ STYLE SPECIAL POUR L'IMPRESSION SUR PAPIER */
@media print {
    /* Masquer tout le site sauf la facture */
    body *, nav, footer, hr, h3, .card, .row, .btn, table:not(.table-bordered) {
        display: none !important;
    }
    /* Afficher uniquement le tableau de facture et son total */
    .table-bordered, .table-bordered *, #total, h2.text-end {
        display: revert !important;
    }
    body {
        background: white;
    }
}
</style>

</head>

<body>

<nav class="navbar navbar-dark">
<div class="container-fluid">
    <a class="navbar-brand">🏪 Gestion Quincaillerie</a>
    <button class="btn btn-light">Admin</button>
</div>
</nav>

<div class="container mt-4">

<!-- Blocs Statistiques -->
<div class="row">
    <div class="col-md-3">
        <div class="card text-center">
            <div class="card-body">
                <h5>Articles</h5>
                <h2 id="nbArticles">150</h2>
            </div>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card text-center bg-success text-white">
            <div class="card-body">
                <h5>Ventes du jour</h5>
                <h2 id="venteJour">0 FCFA</h2>
            </div>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card text-center bg-warning">
            <div class="card-body">
                <h5>Clients</h5>
                <h2>20</h2>
            </div>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card text-center bg-danger text-white">
            <div class="card-body">
                <h5>Stock faible</h5>
                <h2>4</h2>
            </div>
        </div>
    </div>
</div>

<hr>

<!-- Section Saisie Nouvelle Vente -->
<h3>Nouvelle Vente</h3>
<div class="row">
    <div class="col-md-4">
        <input id="produit" class="form-control" placeholder="Nom du produit">
    </div>
    <div class="col-md-2">
        <input id="prix" type="number" class="form-control" placeholder="Prix">
    </div>
    <div class="col-md-2">
        <input id="qte" type="number" class="form-control" placeholder="Qté">
    </div>
    <div class="col-md-2">
        <button class="btn btn-primary w-100" onclick="ajouter()">Ajouter</button>
    </div>
</div>

<hr>

<!-- Section Facturation -->
<h3>Facture</h3>
<table class="table table-bordered">
    <thead class="table-dark">
        <tr>
            <th>Produit</th>
            <th>Prix</th>
            <th>Qté</th>
            <th>Total</th>
        </tr>
    </thead>
    <tbody id="liste">
        <!-- Les lignes de vente apparaîtront ici -->
    </tbody>
</table>

<h2 class="text-end">
    TOTAL : <span id="total">0</span> FCFA
</h2>

<!-- Boutons d'action réparés et connectés -->
<button class="btn btn-success" onclick="imprimerFacture()">Imprimer Facture</button>
<button class="btn btn-danger" onclick="annulerVente()">Annuler Vente</button>

<hr>

<!-- Section Stock disponible -->
<h3>Stock</h3>
<table class="table table-striped">
    <thead>
        <tr>
            <th>Produit</th>
            <th>Stock</th>
            <th>Prix</th>
        </tr>
    </thead>
    <tbody>
        <tr><td>Marteau</td><td>50</td><td>3000</td></tr>
        <tr><td>Clous</td><td>500</td><td>50</td></tr>
        <tr><td>Peinture</td><td>25</td><td>15000</td></tr>
        <tr><td>Ciment</td><td>100</td><td>7000</td></tr>
    </tbody>
</table>

</div>

<footer>
    Logiciel de Gestion de Quincaillerie ©️ 2026
</footer>

<!-- Logique Script Javascript réécrite -->
<script>
let total = 0;

// 1. Ajouter un produit avec validation de sécurité renforcée
function ajouter() {
    let produit = document.getElementById("produit").value.trim();
    let prix = parseFloat(document.getElementById("prix").value);
    let qte = parseFloat(document.getElementById("qte").value);

    // Blocage si vide, si négatif, ou égal à 0
    if (produit === "" || isNaN(prix) || prix <= 0 || isNaN(qte) || qte <= 0) {
        alert("Erreur : Veuillez entrer un produit valide et des valeurs supérieures à 0.");
        return;
    }

    let somme = prix * qte;
    total += somme;

    // Insertion propre avec séparateurs de milliers (.toLocaleString())
    document.getElementById("liste").innerHTML += `
        <tr>
            <td>${produit}</td>
            <td>${prix.toLocaleString()}</td>
            <td>${qte}</td>
            <td>${somme.toLocaleString()}</td>
        </tr>
    `;

    mettreAjourAffichage();

    // Vider les champs et remettre le focus de saisie
    document.getElementById("produit").value = "";
    document.getElementById("prix").value = "";
    document.getElementById("qte").value = "";
    document.getElementById("produit").focus();
}

// 2. Annuler la vente en cours et remettre à zéro
function annulerVente() {
    if (confirm("Voulez-vous vraiment annuler la vente en cours ? Tout sera effacé.")) {
        total = 0;
        document.getElementById("liste").innerHTML = "";
        mettreAjourAffichage();
    }
}

// 3. Lancer l'impression propre de la facture
function imprimerFacture() {
    if (total === 0) {
        alert("La facture est vide. Impossible de l'imprimer.");
        return;
    }
    window.print();
}

// 4. Mettre à jour l'affichage des totaux sur l'écran
function mettreAjourAffichage() {
    document.getElementById("total").innerHTML = total.toLocaleString();
    document.getElementById("venteJour").innerHTML = total.toLocaleString() + " FCFA";
}
</script>

</body>
</html>
